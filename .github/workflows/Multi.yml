name: دانلود چند لینک

on:
  workflow_dispatch:
    inputs:
      link1:
        description: 'لینک 1'
        required: false
        type: string
      link2:
        description: 'لینک 2'
        required: false
        type: string
      link3:
        description: 'لینک 3'
        required: false
        type: string
      link4:
        description: 'لینک 4'
        required: false
        type: string
      link5:
        description: 'لینک 5'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: نصب 7z
        run: sudo apt-get update && sudo apt-get install -y p7zip-full
      
      - name: دانلود فایل‌ها
        run: |
          mkdir -p downloads
          cd downloads
          
          # چک کردن لینک 1
          if [ -n "${{ inputs.link1 }}" ]; then
            echo "⬇️ دانلود لینک 1: ${{ inputs.link1 }}"
            curl -L -O "${{ inputs.link1 }}"
          fi
          
          # چک کردن لینک 2
          if [ -n "${{ inputs.link2 }}" ]; then
            echo "⬇️ دانلود لینک 2: ${{ inputs.link2 }}"
            curl -L -O "${{ inputs.link2 }}"
          fi
          
          # چک کردن لینک 3
          if [ -n "${{ inputs.link3 }}" ]; then
            echo "⬇️ دانلود لینک 3: ${{ inputs.link3 }}"
            curl -L -O "${{ inputs.link3 }}"
          fi
          
          # چک کردن لینک 4
          if [ -n "${{ inputs.link4 }}" ]; then
            echo "⬇️ دانلود لینک 4: ${{ inputs.link4 }}"
            curl -L -O "${{ inputs.link4 }}"
          fi
          
          # چک کردن لینک 5
          if [ -n "${{ inputs.link5 }}" ]; then
            echo "⬇️ دانلود لینک 5: ${{ inputs.link5 }}"
            curl -L -O "${{ inputs.link5 }}"
          fi
          
          cd ..
          
          COUNT=$(ls downloads/ | wc -l)
          echo "✅ تعداد فایل‌های دانلود شده: $COUNT"
          
          if [ $COUNT -eq 0 ]; then
            echo "❌ هیچ فایلی دانلود نشد"
            exit 1
          fi
          
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
      
      - name: فشرده و پارت بندی
        run: |
          7z a -v95m -mx3 "archive_${{ env.TIMESTAMP }}.7z" downloads/
          rm -rf downloads
      
      - name: ساخت فایل لینک
        run: |
          RANDOM_NUM=$((RANDOM % 90000 + 10000))
          LINKS_FILE="links_${RANDOM_NUM}.txt"
          
          echo "=== لینک‌های دانلود ===" > $LINKS_FILE
          echo "تاریخ: $(date)" >> $LINKS_FILE
          echo "" >> $LINKS_FILE
          
          for file in archive_${{ env.TIMESTAMP }}.7z.*; do
            if [ -f "$file" ]; then
              echo "https://raw.githubusercontent.com/${{ github.repository }}/main/$file" >> $LINKS_FILE
            fi
          done
          
          echo "LINKS_FILE=$LINKS_FILE" >> $GITHUB_ENV
      
      - name: ارسال به ریپو
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add archive_${{ env.TIMESTAMP }}.7z.*
          git add ${{ env.LINKS_FILE }}
          git commit -m "download" || echo "done"
          git push
      
      - name: نمایش لینک
        run: |
          echo "✅ https://raw.githubusercontent.com/${{ github.repository }}/main/${{ env.LINKS_FILE }}"
