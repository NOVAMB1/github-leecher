name: دانلود و ساخت لینک

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: نصب 7z
        run: sudo apt-get update && sudo apt-get install -y p7zip-full
      
      - name: دانلود فایل
        run: |
          RANDOM_VID=$((RANDOM % 90000 + 10000))
          VIDEO_NAME="Vid${RANDOM_VID}.mp4"
          echo "VIDEO_NAME=$VIDEO_NAME" >> $GITHUB_ENV
          echo "RANDOM_VID=$RANDOM_VID" >> $GITHUB_ENV
          
          curl -L --fail --retry 3 -o "$VIDEO_NAME" "${{ github.event.inputs.file_url }}"
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
      
      - name: پارت بندی
        run: |
          7z a -v95m -mx3 "archive_${{ env.TIMESTAMP }}.7z" "${{ env.VIDEO_NAME }}"
          rm "${{ env.VIDEO_NAME }}"
      
      - name: ساخت فایل لینک
        run: |
          RANDOM_NUM=$((RANDOM % 90000 + 10000))
          LINKS_FILE="links_${RANDOM_NUM}.txt"
          
          echo "=== لینک‌های دانلود ===" > $LINKS_FILE
          echo "نام فایل اصلی: ${{ env.VIDEO_NAME }}" >> $LINKS_FILE
          echo "" >> $LINKS_FILE
          
          # پیدا کردن همه پارت‌ها و نوشتن لینک
          for file in archive_${{ env.TIMESTAMP }}.7z.*; do
            if [ -f "$file" ]; then
              echo "https://raw.githubusercontent.com/${{ github.repository }}/main/$file" >> $LINKS_FILE
            fi
          done
          
          # اگه فقط یه فایل بود (زیر 95 مگ)
          if [ -f "archive_${{ env.TIMESTAMP }}.7z" ]; then
            echo "https://raw.githubusercontent.com/${{ github.repository }}/main/archive_${{ env.TIMESTAMP }}.7z" >> $LINKS_FILE
          fi
          
          echo "" >> $LINKS_FILE
          echo "=== برای合并: 7z x archive_${{ env.TIMESTAMP }}.7z.001 ===" >> $LINKS_FILE
          echo "=== بعد از合并، فایل با اسم ${{ env.VIDEO_NAME }} باز می‌شود ===" >> $LINKS_FILE
          
          echo "LINKS_FILE=$LINKS_FILE" >> $GITHUB_ENV
      
      - name: ارسال به ریپو
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add archive_${{ env.TIMESTAMP }}.7z.* 2>/dev/null || true
          git add archive_${{ env.TIMESTAMP }}.7z 2>/dev/null || true
          git add ${{ env.LINKS_FILE }}
          git commit -m "دانلود فایل و لینک‌ها" || echo "done"
          git push
      
      - name: نمایش لینک‌ها
        run: |
          echo ""
          echo "========================================="
          echo "✅ فایل لینک‌ها:"
          echo "https://raw.githubusercontent.com/${{ github.repository }}/main/${{ env.LINKS_FILE }}"
          echo ""
          echo "📁 نام فایل اصلی: ${{ env.VIDEO_NAME }}"
          echo "========================================="
          echo "📁 لینک‌های داخل فایل:"
          cat ${{ env.LINKS_FILE }}
          echo "========================================="
